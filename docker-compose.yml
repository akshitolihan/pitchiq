version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./football_analysis.db
      STUB_USER_TIER: ${STUB_USER_TIER:-free}
      ADMIN_SECRET: ${ADMIN_SECRET:-dev-secret}
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./football_analysis.db:/app/football_analysis.db
    command: uvicorn api.index:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
